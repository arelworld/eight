<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background-color: #C1E1C1; font-family: sans-serif; padding: 20px; }
        .sticky-note { 
            background-color: #E0F2E9; 
            padding: 15px; 
            margin: 10px; 
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            max-width: 400px;
        }
    </style>
</head>
<body>
    <h1>My Journey for Eight</h1>
    <input type="date" id="datePicker">
    <div id="notesContainer"></div>

    <script>
        // This is where your data will live
        const notes = [
            { date: "2026-06-20", text: "Thinking of you today, Eight.", type: "text" }
        ];

        function displayNotes(targetDate) {
            const container = document.getElementById('notesContainer');
            container.innerHTML = '';
            notes.filter(n => n.date <= targetDate).forEach(note => {
                container.innerHTML += `<div class="sticky-note">${note.text}</div>`;
            });
        }
        
        document.getElementById('datePicker').addEventListener('change', (e) => {
            displayNotes(e.target.value);
        });
    </script>
</body>
</html>
